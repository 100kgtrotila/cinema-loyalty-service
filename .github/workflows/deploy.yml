name: Deploy NestJS Loyalty

on:
  push:
    branches: [ master ]

concurrency:
  group: deploy-loyalty-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "[DEBUG] Show runner + commit info"
        run: |
          echo "=========================================="
          echo "Runner OS: $(uname -a)"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "Branch: $GITHUB_REF_NAME"
          echo "SHA: $GITHUB_SHA"
          git rev-parse HEAD
          git log -1 --oneline
          echo "=========================================="

      - name: "[DEBUG] Test TCP port 22"
        run: |
          echo "=========================================="
          echo "Target host: ${{ secrets.HOST }}"
          echo "Testing port 22 with nc (timeout 10s)..."
          nc -zv -w 10 ${{ secrets.HOST }} 22 \
            && echo "✅ PORT 22 IS OPEN" \
            || echo "❌ PORT 22 IS CLOSED OR TIMEOUT"
          echo "=========================================="

      - name: "[DEBUG] Validate SSH key format"
        run: |
          echo "=========================================="
          echo "Checking SSH key format..."
          echo "${{ secrets.SSH_KEY }}" > /tmp/test_key
          chmod 600 /tmp/test_key
          ssh-keygen -l -f /tmp/test_key \
            && echo "✅ SSH key is VALID" \
            || echo "❌ SSH key is INVALID or wrong format"
          rm -f /tmp/test_key
          echo "=========================================="

      - name: "[DEBUG] Test SSH handshake (verbose)"
        run: |
          echo "=========================================="
          echo "Testing SSH connection with verbose output..."
          echo "${{ secrets.SSH_KEY }}" > /tmp/test_key
          chmod 600 /tmp/test_key
          ssh -vvv \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -o BatchMode=yes \
            -i /tmp/test_key \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }} \
            "echo '✅ SSH CONNECTION SUCCESSFUL'" \
            2>&1 | head -80
          rm -f /tmp/test_key
          echo "=========================================="

      - name: Clean remote loyalty workspace (remove stale files)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            echo "Cleaning /root/cinema-platform/loyalty ..."
            rm -rf /root/cinema-platform/loyalty
            mkdir -p /root/cinema-platform/loyalty

      - name: Copy files via SSH (fresh sync)
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/root/cinema-platform/loyalty"

      - name: Build and Restart NestJS Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail

            cd /root/cinema-platform

            echo "=========================================="
            echo "[Server] Verifying deployed files..."
            ls -la loyalty | head -50
            echo "------------------------------------------"
            echo "[Server] Check for stale admin-loyalty folder (should be absent if you removed it in repo):"
            test -d loyalty/src/admin-loyalty && echo "⚠️  STILL PRESENT: loyalty/src/admin-loyalty" || echo "✅ OK: no loyalty/src/admin-loyalty"
            echo "=========================================="

            echo "[Server] Building & starting loyalty-service via docker compose..."
            docker compose up -d --build loyalty-service

            echo "[Server] Pruning unused images..."
            docker image prune -f